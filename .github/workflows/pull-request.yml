name: "Validate PR"

on:
  pull_request:
  push:
    branches:
    - master

jobs:
  lint:
    name: Lint Project
    runs-on: ubuntu-22.04
    steps:
      # Checkout everything since ct uses git diff to determine charts
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 
      - name: Execute Lint
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-22.04
    needs:
      - lint
    steps:
      # Checkout everything since ct uses git diff to determine charts
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 
      - name: Execute Tests
        run: make test
